#配置项参考
spring:
  cache:
    type: redis
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      client-name: travis-monolith
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 2000  #最大连接数
          max-idle: 20  #最大空闲连接数
          min-idle: 5 #最小空闲连接数